name: Build and Push gsd-browser-mcp-server

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/jemplayer82/gsd-browser-mcp-server

jobs:
  build-push:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          file: Dockerfile
          push: true
          tags: ghcr.io/jemplayer82/gsd-browser-mcp-server:latest
