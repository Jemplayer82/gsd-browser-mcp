services:
  gsd-browser-mcp:
    image: ghcr.io/jemplayer82/gsd-browser-mcp-server:latest
    container_name: gsd-browser-mcp-server
    restart: unless-stopped

    ports:
      - "8788:8788"

    environment:
      PORT: "8788"
      GSD_BROWSER_MCP_TOKEN: ${GSD_BROWSER_MCP_TOKEN}

    shm_size: "256mb"

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8788/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
